name: Spotify
id: spotify
description: Spotify music streaming client
dependencies: []
check:
  linux: |
    flatpak --user info com.spotify.Client &> /dev/null
  windows: |
    where.exe spotify.exe >nul
install:
  fedora: |
    # Ensure Flatpak is available
    sudo dnf install -y flatpak
    sudo flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
    # Install (if not already)
    sudo flatpak install -y --noninteractive flathub com.spotify.Client
  ubuntu: |
    # Use Flatpak (Ubuntu 22.04+ usually has Flatpak)
    sudo apt-get install -y flatpak
    flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
    flatpak install -y --noninteractive flathub com.spotify.Client
  windows: |
    # Install via WinGet (non-interactive, skip upgrade if exists)
    winget install --id Spotify.Spotify --silent --accept-package-agreements --no-upgrade
