package_schema_version: 1

name: Flutter
id: flutter
version: 1
description: Git version control
type: utility
tags:
  - development

dependencies:
  fedora:
    - git
  windows:
    - git
supported_os:
  - disabeled
check:
  fedora:
    - git -v
  windows:
    - git -v

install:
  fedora:
    - sudo dnf install git
  windows:
    - winget install --id Git.Git --silent --accept-package-agreements --no-upgrade --scope user
