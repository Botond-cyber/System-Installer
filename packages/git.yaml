package_schema_version: 1

name: Git
id: git
version: 1
description: Git version control
type: utility
tags:
  - development

supported_os:
  - fedora
  - windows

check:
  fedora: |
    if command -v git >/dev/null 2>&1; then
      echo true
    else
      echo false
    fi
  windows: |
    if (Get-Command git -ErrorAction SilentlyContinue) {
      Write-Output true
    } else {
      Write-Output false
    }

install:
  fedora:
    - sudo dnf install git
  windows:
    - winget install --id Git.Git --silent --accept-package-agreements --no-upgrade --scope user
